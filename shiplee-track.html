<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#16A34A">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Track Order | ShipLee</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ─── Tokens (matches shiplee.html) ────────────────────────── */
        :root {
            --green:        #22C55E;
            --green-dark:   #16A34A;
            --green-deep:   #15803D;
            --green-light:  #DCFCE7;
            --text-dark:    #0F172A;
            --text-mid:     #334155;
            --text-muted:   #64748B;
            --glass-bg:     rgba(255,255,255,0.58);
            --glass-border: rgba(255,255,255,0.85);
        }

        /* ─── Reset ─────────────────────────────────────────────────── */
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { touch-action: manipulation; }

        body {
            font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background: #F5F7FA;
            background-image:
                radial-gradient(ellipse 80% 60% at 5% 0%,   rgba(219,234,254,0.60) 0%, transparent 65%),
                radial-gradient(ellipse 60% 80% at 95% 100%, rgba(233,213,255,0.30) 0%, transparent 60%),
                radial-gradient(ellipse 55% 40% at 50% 30%,  rgba(255,255,255,0.80) 0%, transparent 55%);
            background-attachment: fixed;
            color: var(--text-mid);
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            padding-top: 68px;
        }

        input,textarea,select,button { font-size: 16px; font-family: inherit; }
        button,a,input[type="button"],input[type="submit"] {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        button { cursor: pointer; }
        a { text-decoration: none; color: inherit; }

        /* ─── HEADER (matches shiplee.html exactly) ─────────────────── */
        .site-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border-bottom: 1px solid rgba(255,255,255,0.65);
            box-shadow: 0 2px 20px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.95);
            height: 68px;
            display: flex;
            align-items: center;
        }
        .header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 32px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-link {
            display: flex; align-items: center; gap: 10px; text-decoration: none;
        }
        .main-nav { display: flex; align-items: center; gap: 4px; }
        .nav-link {
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-mid);
            transition: all 0.2s;
            min-height: 40px;
            display: flex;
            align-items: center;
        }
        .nav-link:hover { background: rgba(34,197,94,0.10); color: var(--green-dark); }
        .nav-link.active { color: var(--green-dark); background: rgba(34,197,94,0.09); }
        .nav-btn {
            padding: 9px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--green-dark);
            border: 1.5px solid rgba(34,197,94,0.35);
            background: rgba(34,197,94,0.08);
            transition: all 0.2s;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .nav-btn:hover { background: rgba(34,197,94,0.16); border-color: var(--green); transform: translateY(-1px); }
        .mobile-nav { display: none; }
        @media (max-width: 640px) {
            .main-nav { display: none; }
            .mobile-nav { display: flex; align-items: center; }
            .mobile-back-link {
                padding: 8px 14px;
                border-radius: 10px;
                font-size: 13px;
                font-weight: 700;
                color: var(--green-dark);
                border: 1.5px solid rgba(34,197,94,0.3);
                background: rgba(34,197,94,0.08);
                min-height: 40px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
        }
        @media (max-width: 480px) {
            .header-inner { padding: 0 16px; }
        }

        /* ─── ESTIMATED DELIVERY BANNER ─────────────────────────────── */
        .delivery-banner {
            background: rgba(220,252,231,0.70);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(34,197,94,0.20);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.75), 0 2px 12px rgba(34,197,94,0.08);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--green-deep);
        }
        .delivery-banner i { font-size: 16px; color: var(--green); }
        .delivery-banner-sep { color: rgba(34,197,94,0.35); font-weight: 300; }

        /* ─── MAIN LAYOUT ────────────────────────────────────────────── */
        .sl-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 32px 80px;
        }

        .sl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ─── GLASS CARD ─────────────────────────────────────────────── */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border: 1.5px solid var(--glass-border);
            border-radius: 24px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.06),
                inset 0 2px 3px rgba(255,255,255,0.95);
            padding: 28px;
            overflow: hidden;
        }

        .card-title {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title i { color: var(--green); font-size: 14px; }

        /* ─── ORDER ID BADGE ─────────────────────────────────────────── */
        .order-id-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34,197,94,0.10);
            border: 1px solid rgba(34,197,94,0.25);
            border-radius: 12px;
            padding: 9px 16px;
            margin-bottom: 24px;
        }
        .order-id-badge i { color: var(--green); font-size: 13px; }
        .order-id-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.4px;
            font-family: monospace;
        }

        /* ─── CANCELLED BANNER ───────────────────────────────────────── */
        .cancelled-banner {
            background: rgba(254,202,202,0.55);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #991B1B;
        }
        .cancelled-banner i { font-size: 28px; color: #EF4444; flex-shrink: 0; }
        .cancelled-banner-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .cancelled-banner-sub { font-size: 13px; opacity: 0.8; }

        /* ─── TIMELINE ───────────────────────────────────────────────── */
        .timeline { position: relative; padding-left: 44px; }

        .timeline-track {
            position: absolute;
            left: 15px; top: 16px; bottom: 16px;
            width: 2px;
            background: rgba(209,250,229,0.8);
            border-radius: 2px;
            overflow: hidden;
        }
        .timeline-fill {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: linear-gradient(to bottom, var(--green), var(--green-dark));
            border-radius: 2px;
            transition: height 1s cubic-bezier(0.4,0,0.2,1);
        }

        .timeline-step {
            position: relative;
            padding-bottom: 28px;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeSlideUp 0.5s ease forwards;
        }
        .timeline-step:last-child { padding-bottom: 0; }

        @keyframes fadeSlideUp { to { opacity: 1; transform: translateY(0); } }

        .timeline-step:nth-child(1) { animation-delay: 0.08s; }
        .timeline-step:nth-child(2) { animation-delay: 0.18s; }
        .timeline-step:nth-child(3) { animation-delay: 0.28s; }
        .timeline-step:nth-child(4) { animation-delay: 0.38s; }
        .timeline-step:nth-child(5) { animation-delay: 0.48s; }

        .timeline-dot {
            position: absolute;
            left: -36px; top: 2px;
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 1;
        }
        .timeline-dot.completed {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff;
            box-shadow: 0 3px 12px rgba(34,197,94,0.38);
        }
        .timeline-dot.current {
            background: #fff;
            color: var(--green);
            border: 2.5px solid var(--green);
            animation: dotPulse 1.8s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.45); }
            50%      { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
        }
        .timeline-dot.upcoming {
            background: rgba(241,245,249,0.8);
            color: #CBD5E1;
            border: 2px solid rgba(203,213,225,0.6);
        }

        .timeline-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            margin-bottom: 3px;
        }
        .timeline-label.upcoming { color: var(--text-muted); font-weight: 500; }
        .timeline-time { font-size: 12px; color: var(--text-muted); }
        .timeline-time.active { color: var(--green-dark); font-weight: 600; }

        /* ─── STATUS BADGE ───────────────────────────────────────────── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        .status-badge.pending     { background: rgba(254,243,199,0.85); color: #D97706; border: 1px solid rgba(251,191,36,0.4); }
        .status-badge.processing  { background: rgba(219,234,254,0.85); color: #1D4ED8; border: 1px solid rgba(96,165,250,0.4); }
        .status-badge.shipped     { background: rgba(224,242,254,0.85); color: #0369A1; border: 1px solid rgba(56,189,248,0.4); }
        .status-badge.delivered   { background: rgba(220,252,231,0.85); color: var(--green-dark); border: 1px solid rgba(34,197,94,0.4); }
        .status-badge.cancelled   { background: rgba(254,226,226,0.85); color: #DC2626; border: 1px solid rgba(239,68,68,0.4); }

        /* ─── DELIVERY INFO ──────────────────────────────────────────── */
        .delivery-info-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(240,253,244,0.65);
            border: 1px solid rgba(34,197,94,0.18);
            border-radius: 12px;
            padding: 11px 16px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .delivery-info-row i { color: var(--green); font-size: 14px; flex-shrink: 0; }
        .delivery-info-label { color: var(--text-muted); font-weight: 600; }
        .delivery-info-value { color: var(--text-dark); font-weight: 700; }

        /* ─── ITEMS ──────────────────────────────────────────────────── */
        .order-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .order-item-row:last-child { border-bottom: none; }

        .item-icon-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: rgba(240,253,244,0.75);
            border: 1px solid rgba(34,197,94,0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .item-info { flex: 1; min-width: 0; }
        .item-title {
            font-size: 13px; font-weight: 700; color: var(--text-dark);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .item-brand { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
        .item-qty-label { font-size: 11px; color: var(--text-mid); }
        .item-line-price { font-size: 13px; font-weight: 700; color: var(--text-dark); white-space: nowrap; }

        /* ─── TOTALS ─────────────────────────────────────────────────── */
        .totals-section {
            background: rgba(240,253,244,0.45);
            border: 1px solid rgba(34,197,94,0.14);
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .totals-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-mid);
            padding: 4px 0;
        }
        .totals-row.grand {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(34,197,94,0.18);
            font-size: 15px;
            font-weight: 800;
            color: var(--text-dark);
        }
        .promo-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(34,197,94,0.10);
            border: 1px solid rgba(34,197,94,0.28);
            border-radius: 8px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: 700;
            color: var(--green-dark);
            margin-top: 8px;
        }

        /* ─── ACTION BUTTONS ─────────────────────────────────────────── */
        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #fff;
            box-shadow: 0 4px 16px rgba(34,197,94,0.35);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.45); }
        .btn-secondary {
            background: var(--glass-bg);
            color: var(--text-mid);
            border: 1.5px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.85); transform: translateY(-1px); }

        /* ─── NOT FOUND STATE ────────────────────────────────────────── */
        .not-found-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 68px);
            padding: 40px 20px;
        }
        .not-found-card {
            max-width: 440px;
            width: 100%;
            text-align: center;
            padding: 48px 36px;
        }
        .not-found-icon {
            width: 80px; height: 80px;
            border-radius: 24px;
            background: rgba(34,197,94,0.10);
            border: 1px solid rgba(34,197,94,0.20);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            color: var(--green);
            margin: 0 auto 24px;
        }
        .not-found-title { font-size: 22px; font-weight: 800; color: var(--text-dark); margin-bottom: 10px; }
        .not-found-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }

        /* ─── PAGE HEADER ROW ────────────────────────────────────────── */
        .page-header-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .page-back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px; height: 38px;
            border-radius: 10px;
            background: var(--glass-bg);
            border: 1.5px solid var(--glass-border);
            color: var(--text-mid);
            font-size: 14px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }
        .page-back-btn:hover { background: rgba(255,255,255,0.85); transform: translateY(-1px); }
        .page-title { font-size: 22px; font-weight: 900; color: var(--text-dark); letter-spacing: -0.5px; }

        /* ─── FOOTER (matches shiplee.html) ──────────────────────────── */
        .sl-footer {
            background: rgba(255,255,255,0.50);
            backdrop-filter: blur(28px) saturate(200%);
            -webkit-backdrop-filter: blur(28px) saturate(200%);
            border-top: 1px solid rgba(255,255,255,0.72);
            box-shadow: 0 -2px 20px rgba(0,0,0,0.03);
        }
        .sl-footer-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 56px 32px 40px;
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr;
            gap: 48px;
        }
        .sl-footer-brand p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.65;
            margin-top: 12px;
            max-width: 220px;
        }
        .sl-footer-col h4 {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dark);
            margin-bottom: 16px;
        }
        .sl-footer-col a {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 11px;
            transition: color 0.2s;
        }
        .sl-footer-col a:hover { color: var(--green-dark); }
        .sl-footer-bottom {
            max-width: 1180px;
            margin: 0 auto;
            padding: 20px 32px 28px;
            border-top: 1px solid rgba(0,0,0,0.07);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            gap: 12px;
            flex-wrap: wrap;
        }
        .sl-footer-bottom a { color: var(--green-dark); font-weight: 600; transition: opacity 0.2s; }
        .sl-footer-bottom a:hover { opacity: 0.75; }

        /* ─── RESPONSIVE ─────────────────────────────────────────────── */
        @media (max-width: 820px) {
            .sl-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 720px) {
            .sl-footer-inner { grid-template-columns: 1fr 1fr; gap: 32px; padding: 40px 16px 28px; }
            .sl-footer-brand { grid-column: 1/-1; }
            .sl-footer-brand p { max-width: none; }
            .sl-footer-bottom { padding: 16px 16px 24px; flex-direction: column; text-align: center; }
        }

        @media (max-width: 600px) {
            .sl-main { padding: 24px 16px 60px; }
            .glass-card { padding: 20px; border-radius: 18px; }
            .delivery-banner { flex-wrap: wrap; text-align: center; font-size: 13px; }
            .delivery-banner-sep { display: none; }
            .page-title { font-size: 18px; }
        }
    </style>
</head>
<body>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── Helpers ────────────────────────────────────────────────
    const KW_CITIES = ["Kuwait City", "Salmiya", "Hawalli", "Farwaniya", "Jahra"];

    function getCityForOrder(id) {
        const last3 = parseInt(id.slice(-3), 10) || 0;
        return KW_CITIES[last3 % 5];
    }

    function addHours(dateStr, h) {
        const d = new Date(dateStr);
        d.setTime(d.getTime() + h * 3600 * 1000);
        return d;
    }

    function addDays(dateStr, d) {
        const dt = new Date(dateStr);
        dt.setDate(dt.getDate() + d);
        return dt;
    }

    function fmtDate(d) {
        return d.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
    }

    function fmtDateTime(d) {
        return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function estDelivery(order) {
        if (order.status === 'Delivered') return 'Delivered';
        const days = (order.status === 'Shipped' || order.status === 'Out for Delivery') ? 1 : 3;
        return fmtDate(addDays(order.date, days));
    }

    const statusStepMap = {
        'Pending':    1,
        'Processing': 2,
        'Shipped':    3,
        'Delivered':  5
    };

    const statusColors = {
        'Pending':    'pending',
        'Processing': 'processing',
        'Shipped':    'shipped',
        'Delivered':  'delivered',
        'Cancelled':  'cancelled'
    };

    const statusIcons = {
        'Pending':    'fa-clock',
        'Processing': 'fa-cog',
        'Shipped':    'fa-truck',
        'Delivered':  'fa-check-circle',
        'Cancelled':  'fa-times-circle'
    };

    // ── Read params ────────────────────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const orderId = params.get('id');

    const mainContent    = document.getElementById('mainContent');
    const deliveryBanner = document.getElementById('deliveryBanner');

    // ── Not-found helper ───────────────────────────────────────
    function renderNotFound(msg, sub) {
        mainContent.innerHTML = `
            <div class="not-found-wrap">
                <div class="glass-card not-found-card">
                    <div class="not-found-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="not-found-title">${msg}</div>
                    <div class="not-found-sub">${sub}</div>
                    <a href="shiplee.html" class="btn btn-primary" style="display:inline-flex;max-width:220px;margin:0 auto;">
                        <i class="fas fa-shipping-fast"></i>
                        Go to ShipLee
                    </a>
                </div>
            </div>
        `;
    }

    // ── Guard: no id param ─────────────────────────────────────
    if (!orderId) {
        renderNotFound('Order Not Found', 'No Order ID was provided.<br>Check your Order ID and try again.');
        return;
    }

    // ── Read from localStorage ─────────────────────────────────
    let orders = [];
    try { orders = JSON.parse(localStorage.getItem('netletOrders')) || []; } catch(e) {}
    const order = orders.find(o => o.id === orderId);

    if (!order) {
        renderNotFound('Order Not Found', `We couldn't find an order with ID <strong>${orderId}</strong>.<br>Check your Order ID and try again.`);
        return;
    }

    // ── Order found — render delivery banner ───────────────────
    const isCancelled = order.status === 'Cancelled';
    const isDelivered  = order.status === 'Delivered';

    if (!isCancelled && !isDelivered) {
        const city    = getCityForOrder(order.id);
        const estDate = estDelivery(order);
        deliveryBanner.style.display = 'flex';
        deliveryBanner.innerHTML = `
            <i class="fas fa-truck-fast"></i>
            <span>Estimated Delivery: <strong>${estDate}</strong></span>
            <span class="delivery-banner-sep">|</span>
            <i class="fas fa-location-dot"></i>
            <span>${city}, Kuwait</span>
        `;
        deliveryBanner.className = 'delivery-banner';
    }

    // ── Timeline data ──────────────────────────────────────────
    const activeSteps = isCancelled ? 0 : (statusStepMap[order.status] || 1);

    const STEPS = [
        { label: 'Order Placed',         icon: 'fa-shopping-cart',      offset: 0  },
        { label: 'Processing',           icon: 'fa-cog',                offset: 1  },
        { label: 'Shipped',              icon: 'fa-truck',              offset: 6  },
        { label: 'Out for Delivery',     icon: 'fa-route',              offset: 24 },
        { label: 'Delivered',            icon: 'fa-house-circle-check', offset: 36 }
    ];

    function stepState(index) {
        const stepNum = index + 1;
        if (isCancelled) return 'upcoming';
        if (stepNum < activeSteps) return 'completed';
        if (stepNum === activeSteps) return 'current';
        return 'upcoming';
    }

    function stepTimestamp(index, state) {
        if (state === 'upcoming') return 'Pending';
        const dt = addHours(order.date, STEPS[index].offset);
        return fmtDateTime(dt);
    }

    const fillPercent = isCancelled ? 0 : Math.max(0, ((activeSteps - 1) / 4) * 100);

    const timelineHTML = STEPS.map((step, i) => {
        const state      = stepState(i);
        const ts         = stepTimestamp(i, state);
        const dotClass   = `timeline-dot ${state}`;
        const labelClass = `timeline-label${state === 'upcoming' ? ' upcoming' : ''}`;
        const timeClass  = `timeline-time${state !== 'upcoming' ? ' active' : ''}`;
        const dotIcon    = state === 'completed' ? 'fa-check' : step.icon;

        return `
            <div class="timeline-step">
                <div class="${dotClass}">
                    <i class="fas ${dotIcon}"></i>
                </div>
                <div class="${labelClass}">${step.label}</div>
                <div class="${timeClass}">${ts}</div>
            </div>
        `;
    }).join('');

    // ── Items HTML ─────────────────────────────────────────────
    const itemsHTML = order.items.map(item => `
        <div class="order-item-row">
            <div class="item-icon-box">
                <i class="${item.icon || 'fas fa-box'}"></i>
            </div>
            <div class="item-info">
                <div class="item-title">${item.title}</div>
                <div class="item-brand">${item.brand}</div>
                <div class="item-qty-label">Qty: ${item.quantity}</div>
            </div>
            <div class="item-line-price">KWD ${(item.price * item.quantity).toFixed(3)}</div>
        </div>
    `).join('');

    // ── Promo chip ─────────────────────────────────────────────
    const promoHTML = order.promoCode ? `
        <div class="promo-chip">
            <i class="fas fa-tag"></i>
            ${order.promoCode} applied
        </div>
    ` : '';

    // ── Status badge ───────────────────────────────────────────
    const badgeClass = statusColors[order.status] || 'pending';
    const badgeIcon  = statusIcons[order.status]  || 'fa-circle';
    const statusBadgeHTML = `
        <span class="status-badge ${badgeClass}">
            <i class="fas ${badgeIcon}"></i>
            ${order.status}
        </span>
    `;

    // ── Delivery info row ──────────────────────────────────────
    const estDeliveryStr  = estDelivery(order);
    const deliveryInfoHTML = `
        <div class="delivery-info-row">
            <i class="fas fa-calendar-check"></i>
            <span class="delivery-info-label">Estimated Delivery:&nbsp;</span>
            <span class="delivery-info-value">${estDeliveryStr}</span>
        </div>
    `;

    // ── Cancelled banner ───────────────────────────────────────
    const cancelledHTML = isCancelled ? `
        <div class="cancelled-banner">
            <i class="fas fa-ban"></i>
            <div>
                <div class="cancelled-banner-title">Order Cancelled</div>
                <div class="cancelled-banner-sub">This order has been cancelled and will not be delivered.</div>
            </div>
        </div>
    ` : `
        <div class="timeline">
            <div class="timeline-track">
                <div class="timeline-fill" style="height: ${fillPercent}%"></div>
            </div>
            ${timelineHTML}
        </div>
    `;

    const orderDateStr = fmtDate(new Date(order.date));

    // ── Full render ────────────────────────────────────────────
    mainContent.innerHTML = `
        <div class="page-header-row">
            <a href="orders.html" class="page-back-btn" title="Back to orders">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="page-title">Track Your Order</div>
        </div>

        <div class="sl-grid">
            <!-- LEFT: Timeline -->
            <div class="glass-card">
                <div class="card-title">
                    <i class="fas fa-route"></i>
                    Tracking Timeline
                </div>
                <div class="order-id-badge">
                    <i class="fas fa-hashtag"></i>
                    <span class="order-id-text">${order.id}</span>
                </div>
                ${cancelledHTML}
            </div>

            <!-- RIGHT: Order Summary -->
            <div class="glass-card">
                <div class="card-title">
                    <i class="fas fa-receipt"></i>
                    Order Summary
                </div>

                ${statusBadgeHTML}
                ${!isCancelled ? deliveryInfoHTML : ''}

                <div class="card-title" style="font-size:13px;margin-bottom:8px;margin-top:4px;">
                    <i class="fas fa-box-open"></i>
                    Items
                </div>
                ${itemsHTML}

                <div class="totals-section">
                    <div class="totals-row">
                        <span>Subtotal</span>
                        <span>KWD ${order.total.toFixed(3)}</span>
                    </div>
                    <div class="totals-row">
                        <span>Shipping</span>
                        <span style="color:var(--green);font-weight:700;">Free</span>
                    </div>
                    ${order.promoCode ? `<div class="totals-row"><span>Promo (${order.promoCode})</span><span style="color:var(--green-dark);font-weight:700;">Applied</span></div>` : ''}
                    <div class="totals-row grand">
                        <span>Total</span>
                        <span>KWD ${order.total.toFixed(3)}</span>
                    </div>
                    ${promoHTML}
                </div>

                <div class="action-buttons">
                    <a href="orders.html" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        Back to Orders
                    </a>
                    <a href="shiplee.html" class="btn btn-primary">
                        <i class="fas fa-search"></i>
                        Track Another Order
                    </a>
                </div>
            </div>
        </div>
    `;

    // Animate timeline fill after paint
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            const fill = document.querySelector('.timeline-fill');
            if (fill) fill.style.height = fillPercent + '%';
        });
    });
});
</script>

</body>
</html>
