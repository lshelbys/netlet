<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | NetLet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --netlet-blue: #1E3A8A; --netlet-red: #E61C38; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #F7F6F2 0%, #F0EFE8 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; max-width: 500px; }
        .error-icon { font-size: 80px; color: var(--netlet-red); margin-bottom: 20px; animation: bounce 2s infinite; }
        h1 { font-size: 48px; font-weight: 800; color: #1F2229; margin-bottom: 10px; }
        .subtitle { font-size: 20px; color: #7E859B; margin-bottom: 30px; }
        p { font-size: 16px; color: #404553; line-height: 1.8; margin-bottom: 30px; }
        .buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 30px; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 15px; transition: all 0.3s; border: none; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, var(--netlet-blue) 0%, #0F2550 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); color: var(--netlet-blue); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.9); }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @media (max-width: 480px) { h1 { font-size: 36px; } .error-icon { font-size: 60px; } .buttons { flex-direction: column; } .btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <h1>404</h1>
        <div class="subtitle">Page Not Found</div>
        <p>Sorry, the page you're looking for doesn't exist. It might have been moved or deleted. Don't worry, let's help you get back on track!</p>
        <div class="buttons">
            <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
            <button class="btn btn-secondary" onclick="history.back()"><i class="fas fa-arrow-left"></i> Go Back</button>
        </div>
    </div>
</body>
</html>
