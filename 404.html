<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | NetLet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --netlet-blue: #1E3A8A; --netlet-red: #E61C38; --text-dark: #1F2229; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #F7F6F2 0%, #F0EFE8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #404553;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 48px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .error-icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }
        .error-icon-glow {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(230, 28, 56, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(30px);
            animation: glow-pulse 2s ease-in-out infinite;
        }
        .error-icon {
            font-size: 100px;
            color: var(--netlet-red);
            animation: bounce 2s infinite;
            position: relative;
            z-index: 1;
            display: block;
        }
        h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 20px;
            color: #7E859B;
            margin-bottom: 16px;
            font-weight: 600;
        }
        p {
            font-size: 15px;
            color: #404553;
            line-height: 1.8;
            margin-bottom: 32px;
        }
        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--netlet-blue) 0%, #0F2550 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 58, 138, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: var(--netlet-blue);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-3px);
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes glow-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
        .mobile-bottom-ui { display: none; }
        @media (max-width: 768px) {
            .container { padding: 0 16px 160px; }
            .error-card { padding: 36px 24px; }
            h1 { font-size: 48px; }
            .error-icon { font-size: 80px; }
            .buttons { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }

            .mobile-bottom-ui {
                display: block;
                position: fixed;
                bottom: 30px;
                left: 15px;
                right: 15px;
                width: calc(100% - 30px);
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(25px) saturate(210%);
                z-index: 2000;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 24px;
                box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
            }

            .mobile-tabs {
                display: flex;
                position: relative;
                justify-content: space-around;
                align-items: center;
                padding: 6px 4px;
            }

            .tab-indicator {
                position: absolute;
                top: 6px;
                left: 0;
                width: 20%;
                height: calc(100% - 12px);
                z-index: 0;
                pointer-events: none;
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .tab-indicator::after {
                content: '';
                display: block;
                margin: 0 4px;
                height: 100%;
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 22px;
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
            }

            .mobile-tab-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 12px 0;
                color: #7E859B;
                font-size: 10px;
                font-weight: 600;
                text-decoration: none;
                flex: 1;
                position: relative;
                z-index: 1;
                background: none;
                border: none;
                cursor: pointer;
            }

            .mobile-tab-item i { font-size: 20px; }

            .mobile-tab-item.active {
                color: var(--netlet-blue);
                transform: translateY(-2px);
            }

            .mobile-cart-badge {
                position: absolute;
                top: -6px;
                right: 20%;
                background-color: var(--netlet-red);
                color: white;
                font-size: 9px;
                font-weight: 700;
                padding: 2px 5px;
                border-radius: 10px;
                min-width: 16px;
                text-align: center;
            }
        }
        @media (max-width: 480px) {
            .error-card { padding: 32px 20px; }
            h1 { font-size: 42px; }
            .error-icon { font-size: 70px; }
            .error-icon-glow { width: 120px; height: 120px; }
            p { font-size: 14px; margin-bottom: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="error-icon-wrapper">
                <div class="error-icon-glow"></div>
                <i class="fas fa-exclamation-triangle error-icon"></i>
            </div>
            <h1>404</h1>
            <div class="subtitle">Page Not Found</div>
            <p>Sorry, the page you're looking for doesn't exist. It might have been moved or deleted. Don't worry, let's help you get back on track!</p>
            <div class="buttons">
                <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
                <button class="btn btn-secondary" onclick="history.back()"><i class="fas fa-arrow-left"></i> Go Back</button>
            </div>
        </div>
    </div>

    <div class="mobile-bottom-ui">
        <nav class="mobile-tabs">
            <div class="tab-indicator"></div>
            <a href="index.html" class="mobile-tab-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="index.html#categories" class="mobile-tab-item">
                <i class="fas fa-th-large"></i>
                <span>Categories</span>
            </a>
            <a href="index.html#deals" class="mobile-tab-item">
                <i class="fas fa-tags"></i>
                <span>Deals</span>
            </a>
            <a href="account.html" class="mobile-tab-item">
                <i class="fas fa-user"></i>
                <span>Account</span>
            </a>
            <a href="cart.html" class="mobile-tab-item">
                <i class="fas fa-shopping-cart"></i>
                <span>Cart</span>
                <span class="mobile-cart-badge">0</span>
            </a>
        </nav>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cartBadge = document.querySelector('.mobile-cart-badge');
            if (cartBadge) {
                const cart = JSON.parse(localStorage.getItem('netletCart')) || [];
                const totalItems = cart.reduce((sum, item) => {
                    return sum + (typeof item === 'object' ? (item.quantity || 1) : 1);
                }, 0);
                cartBadge.textContent = totalItems;
            }

            const mobileTabs = document.querySelectorAll('.mobile-tab-item');
            const indicator = document.querySelector('.tab-indicator');
            mobileTabs.forEach((tab, index) => {
                tab.addEventListener('click', function() {
                    mobileTabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    if (indicator) indicator.style.transform = `translateX(${index * 100}%)`;
                });
            });
        });
    </script>
</body>
</html>
