<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Your Cart | NetLet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --netlet-blue: #1E3A8A;
            --netlet-orange: #ffa86e;
            --bg-gray: #F7F9FA;
            --text-dark: #1F2229;
        }

        body {
            font-family: 'system-ui', -apple-system, sans-serif;
            background-color: var(--bg-gray);
            color: #404553;
            margin: 0;
            padding-top: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Prevent iOS zoom on input focus */
        input, textarea, select, button {
            font-size: 16px;
        }

        /* Touch-friendly interactions */
        button, a, input[type="button"], input[type="submit"] {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
        }

        /* Reuse Header Styles */
        .cart-header {
            background: rgba(247, 246, 242, 0.75);
            backdrop-filter: blur(25px) saturate(210%);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            padding: 20px;
        }

        .cart-items-section { flex: 2; }
        .order-summary-section { flex: 1; }

        /* Liquid Glass Item Card */
        .cart-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            gap: 20px;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                inset 0 -1px 1px rgba(0, 0, 0, 0.05);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-item:hover { 
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px) scale(1.01); 
        }

        .item-image {
            width: 100px; height: 100px;
            background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #E2E5F1;
        }

        .item-details { flex: 1; }
        .item-title { font-weight: 700; font-size: 16px; margin: 0 0 5px 0; }
        .item-price { color: var(--text-dark); font-weight: 800; font-size: 18px; }

        .remove-btn {
            background: none; border: none; color: #E61C38;
            cursor: pointer; font-weight: 600; padding: 5px 0;
        }

        /* Order Summary Glass Box */
        .summary-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 24px;
            position: sticky; top: 120px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        .summary-row {
            display: flex; justify-content: space-between;
            margin-bottom: 12px; font-weight: 500;
        }

        .total-row {
            border-top: 1px solid #ddd;
            padding-top: 15px; margin-top: 15px;
            font-size: 20px; font-weight: 800;
        }

        .checkout-btn {
            width: 100%;
            background: var(--netlet-blue);
            color: white; border: none;
            padding: 15px; border-radius: 12px;
            font-weight: 700; font-size: 16px;
            margin-top: 20px; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .checkout-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
        }

        .empty-cart {
            text-align: center; padding: 100px 0;
            font-size: 20px; font-weight: 600;
        }

        /* MOBILE UI STYLES (MATCHING INDEX) */
        .mobile-bottom-ui { display: none; }

        /* Accessibility: visible keyboard focus ring */
        a:focus-visible,
        button:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--netlet-blue);
            outline-offset: 2px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 16px; gap: 16px; }
            .order-summary-section { order: -1; }
            .summary-box { position: static; margin-bottom: 20px; }

            /* Compact cart items so they fit narrow screens */
            .cart-item { padding: 14px; gap: 14px; }
            .item-image { width: 72px; height: 72px; font-size: 30px; }
            .item-title { font-size: 15px; }
            .cart-header h2 { font-size: 16px; }

            .mobile-bottom-ui {
                display: block;
                position: fixed;
                bottom: 30px;
                left: 15px;
                right: 15px;
                width: calc(100% - 30px);
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(25px) saturate(210%);
                -webkit-backdrop-filter: blur(25px) saturate(210%);
                z-index: 2000;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 24px;
                box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
                padding-bottom: env(safe-area-inset-bottom);
            }

            .mobile-tabs {
                display: flex;
                position: relative;
                justify-content: space-around;
                align-items: center;
                padding: 6px 4px;
            }

            .tab-indicator {
                position: absolute;
                top: 6px;
                left: 0;
                width: 20%;
                height: calc(100% - 12px);
                z-index: 0;
                pointer-events: none;
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .tab-indicator::after {
                content: '';
                display: block;
                margin: 0 4px;
                height: 100%;
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 22px;
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
            }

            .mobile-tab-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 12px 0;
                color: #7E859B;
                font-size: 10px;
                font-weight: 600;
                text-decoration: none;
                flex: 1;
                position: relative;
                z-index: 1;
                transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .mobile-tab-item i { font-size: 20px; }

            .mobile-tab-item.active {
                color: var(--netlet-blue);
                transform: translateY(-2px);
            }

            .mobile-cart-badge {
                position: absolute;
                top: -6px;
                right: 20%;
                background-color: #E61C38;
                color: white;
                font-size: 9px;
                font-weight: 700;
                padding: 2px 5px;
                border-radius: 10px;
                min-width: 16px;
                text-align: center;
            }

            body { padding-bottom: 130px; }
        }

        /* Confirm Modal Styles */
        #confirmModal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 3000; align-items: center; justify-content: center;
        }
        #confirmModal.active { display: flex; }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px;
            max-width: 300px; text-align: center;
        }
    </style>
</head>
<body>
    <header class="cart-header">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html"><img src="logo.png" alt="NetLet home" width="3130" height="1725" decoding="async" style="height: 50px; width: auto;"></a>
            <h2 style="margin: 0; font-size: 18px;">Shopping Cart</h2>
            <a href="index.html" style="color: var(--netlet-blue); font-weight: 700;">Continue Shopping</a>
        </div>
    </header>

    <main class="container" id="cartContainer">
        <div class="cart-items-section" id="cartItems">
            <!-- Items injected by cart.js -->
        </div>

        <div class="order-summary-section">
            <div class="summary-box">
                <h3 style="margin-top: 0;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal (<span id="itemCount">0</span> items)</span>
                    <span>KWD <span id="subtotal">0.00</span></span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: #28a745;">FREE</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span>KWD <span id="total">0.00</span></span>
                </div>
                <button class="checkout-btn">CHECKOUT NOW</button>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom UI for Cart Page -->
    <div class="mobile-bottom-ui">
        <nav class="mobile-tabs">
            <div class="tab-indicator" style="transform: translateX(400%);"></div>
            <a href="index.html" class="mobile-tab-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="index.html#categories" class="mobile-tab-item">
                <i class="fas fa-th-large"></i>
                <span>Categories</span>
            </a>
            <a href="index.html#deals" class="mobile-tab-item">
                <i class="fas fa-tags"></i>
                <span>Deals</span>
            </a>
            <a href="#" class="mobile-tab-item">
                <i class="fas fa-user"></i>
                <span>Account</span>
            </a>
            <a href="cart.html" class="mobile-tab-item active">
                <i class="fas fa-shopping-cart"></i>
                <span>Cart</span>
                <span class="mobile-cart-badge">0</span>
            </a>
        </nav>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal">
        <div class="modal-content">
            <h3>Remove Item?</h3>
            <p>Are you sure you want to remove this from your cart?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="cancelBtn" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; cursor:pointer;">Cancel</button>
                <button id="confirmBtn" style="flex:1; padding:10px; border-radius:8px; background:#E61C38; color:white; border:none; cursor:pointer;">Remove</button>
            </div>
        </div>
    </div>

    <script type="module" src="cart.js"></script>
    <script>
        // Debug logging to see cart state
        window.addEventListener('load', () => {
            const cartIds = JSON.parse(localStorage.getItem('netletCart')) || [];
            console.log('Cart page loaded. Cart IDs in storage:', cartIds);
            console.log('Cart length:', cartIds.length);
        });

        window.addEventListener('error', (e) => {
            console.error('JavaScript Error:', e.message, e.filename);
        });

        // Tab Switching Feedback
        const mobileTabs = document.querySelectorAll('.mobile-tab-item');
        const indicator = document.querySelector('.tab-indicator');

        mobileTabs.forEach((tab, index) => {
            tab.addEventListener('click', function() {
                mobileTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                if (indicator) indicator.style.transform = `translateX(${index * 100}%)`;
            });
        });
    </script>
</body>
</html>
