<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#1E3A8A">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Your Cart | NetLet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --netlet-blue: #1E3A8A;
            --netlet-orange: #ffa86e;
            --bg-gray: #F7F9FA;
            --text-dark: #1F2229;
        }

        body {
            font-family: 'system-ui', -apple-system, sans-serif;
            background-color: var(--bg-gray);
            color: #404553;
            margin: 0;
            padding-top: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Prevent iOS zoom on input focus */
        input, textarea, select, button {
            font-size: 16px;
        }

        /* Touch-friendly interactions */
        button, a, input[type="button"], input[type="submit"] {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-height: 44px;
        }

        /* Reuse Header Styles */
        .cart-header {
            background: rgba(247, 246, 242, 0.75);
            backdrop-filter: blur(25px) saturate(210%);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            padding: 20px;
        }

        .cart-items-section { flex: 2; }
        .order-summary-section { flex: 1; }

        /* Liquid Glass Item Card */
        .cart-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            gap: 20px;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.4),
                inset 0 -1px 1px rgba(0, 0, 0, 0.05);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-item:hover { 
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px) scale(1.01); 
        }

        .item-image {
            width: 100px; height: 100px;
            background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #E2E5F1;
        }

        .item-details { flex: 1; }
        .item-title { font-weight: 700; font-size: 16px; margin: 0 0 5px 0; }
        .item-price { color: var(--text-dark); font-weight: 800; font-size: 18px; }

        .remove-btn {
            background: none; border: none; color: #E61C38;
            cursor: pointer; font-weight: 600; padding: 5px 0;
        }

        /* Order Summary Glass Box */
        .summary-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 24px;
            position: sticky; top: 120px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.5);
        }

        .summary-row {
            display: flex; justify-content: space-between;
            margin-bottom: 12px; font-weight: 500;
        }

        .total-row {
            border-top: 1px solid rgba(255, 255, 255, 0.35);
            padding-top: 15px; margin-top: 15px;
            font-size: 20px; font-weight: 800;
        }

        /* Promo Code Section */
        .promo-section {
            margin: 16px 0;
            padding: 16px;
            background: rgba(30, 58, 138, 0.08);
            border: 1px solid rgba(30, 58, 138, 0.2);
            border-radius: 12px;
        }

        .promo-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        #promoCode {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04), inset 0 1px 1px rgba(255,255,255,0.7);
            transition: all 0.3s ease;
            outline: none;
        }

        #promoCode:focus {
            background: rgba(255, 255, 255, 0.65);
            border-color: rgba(30, 58, 138, 0.4);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.08), inset 0 1px 1px rgba(255,255,255,0.8);
        }

        #promoCode::placeholder {
            color: #7E859B;
        }

        .apply-promo-btn {
            padding: 10px 16px;
            background: rgba(30, 58, 138, 0.72);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            box-shadow: 0 4px 14px rgba(30, 58, 138, 0.25), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        .apply-promo-btn:hover {
            background: rgba(30, 58, 138, 0.88);
            border-color: rgba(255, 255, 255, 0.45);
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.35), inset 0 1px 1px rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .promo-message {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            margin-top: 8px;
        }

        .promo-message.success {
            color: #28a745;
        }

        .promo-message.error {
            color: #E61C38;
        }

        .discount-row {
            color: #28a745;
            font-weight: 700;
        }

        .checkout-btn {
            width: 100%;
            background: rgba(30, 58, 138, 0.80);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 20px rgba(30, 58, 138, 0.3), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        .checkout-btn:hover {
            background: rgba(30, 58, 138, 0.93);
            border-color: rgba(255, 255, 255, 0.45);
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(30, 58, 138, 0.4), inset 0 1px 1px rgba(255,255,255,0.25);
        }

        .checkout-btn:active {
            transform: scale(0.99);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.25), inset 0 1px 1px rgba(255,255,255,0.15);
        }

        .empty-cart {
            text-align: center; padding: 100px 0;
            font-size: 20px; font-weight: 600;
        }

        /* MOBILE UI STYLES (MATCHING INDEX) */
        .mobile-bottom-ui { display: none; }

        /* Accessibility: visible keyboard focus ring */
        a:focus-visible,
        button:focus-visible,
        select:focus-visible {
            outline: 2px solid var(--netlet-blue);
            outline-offset: 2px;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 16px; gap: 16px; }
            .order-summary-section { order: -1; }
            .summary-box { position: static; margin-bottom: 20px; }

            /* Compact cart items so they fit narrow screens */
            .cart-item {
                padding: 14px;
                gap: 14px;
                flex-wrap: wrap;
            }
            .item-image { width: 72px; height: 72px; font-size: 30px; flex-shrink: 0; }
            .item-title { font-size: 15px; }
            .cart-header h2 { font-size: 16px; }

            /* Better mobile header layout */
            .cart-header {
                padding: 12px 0;
            }

            .cart-header > div {
                flex-wrap: wrap;
                gap: 8px;
            }

            .cart-header a:last-child {
                display: none;
            }

            /* Improve quantity controls on mobile */
            .qty-controls {
                display: flex;
                gap: 8px;
                align-items: center;
                width: 100%;
                margin-top: 8px;
            }

            .qty-controls button {
                padding: 6px 12px;
                font-size: 14px;
                min-height: 44px;
            }

            .qty-input {
                width: 50px;
                padding: 6px;
                text-align: center;
                font-size: 14px;
            }

            /* Better summary box styling for mobile */
            .summary-box {
                border-radius: 16px;
                padding: 18px;
            }

            .summary-box h3 {
                font-size: 18px;
                margin-bottom: 16px;
            }

            .summary-row {
                font-size: 14px;
                margin-bottom: 10px;
            }

            .total-row {
                font-size: 18px;
                margin-top: 12px;
                padding-top: 12px;
            }

            .checkout-btn {
                padding: 14px;
                font-size: 15px;
                margin-top: 16px;
                min-height: 48px;
            }

            /* Remove button styling */
            .remove-btn {
                width: 100%;
                text-align: center;
                padding: 8px;
                margin-top: 8px;
                background: rgba(230, 28, 56, 0.1);
                border: 1px solid rgba(230, 28, 56, 0.3);
                border-radius: 8px;
            }

            /* Empty cart text adjustment */
            .empty-cart {
                padding: 60px 20px;
                font-size: 18px;
            }

            /* Better item details layout */
            .item-details {
                display: flex;
                flex-direction: column;
                width: 100%;
            }

            .item-meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 8px;
                width: 100%;
            }

            .item-price {
                font-size: 16px;
            }

            /* Ensure mobile nav doesn't overlap content */
            body {
                padding-bottom: 130px;
                padding-top: 80px;
            }

            .cart-header {
                padding: 14px 0;
            }

            /* Mobile Bottom Navigation Menu */
            .mobile-bottom-ui {
                display: block;
                position: fixed;
                bottom: 30px;
                left: 15px;
                right: 15px;
                width: calc(100% - 30px);
                background: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(25px) saturate(210%);
                -webkit-backdrop-filter: blur(25px) saturate(210%);
                z-index: 2000;
                border: 1px solid rgba(255, 255, 255, 0.3);
                border-radius: 24px;
                box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255, 255, 255, 0.5);
                padding-bottom: env(safe-area-inset-bottom);
            }

            .mobile-tabs {
                display: flex;
                position: relative;
                justify-content: space-around;
                align-items: center;
                padding: 6px 4px;
            }

            .tab-indicator {
                position: absolute;
                top: 6px;
                left: 0;
                width: 20%;
                height: calc(100% - 12px);
                z-index: 0;
                pointer-events: none;
                transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .tab-indicator::after {
                content: '';
                display: block;
                margin: 0 4px;
                height: 100%;
                background: rgba(255, 255, 255, 0.15);
                border: 1px solid rgba(255, 255, 255, 0.5);
                border-radius: 22px;
                box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.2);
            }

            .mobile-tab-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 12px 0;
                color: #7E859B;
                font-size: 10px;
                font-weight: 600;
                text-decoration: none;
                flex: 1;
                position: relative;
                z-index: 1;
                background: none;
                border: none;
                cursor: pointer;
                transition: all 0.3s;
            }

            .mobile-tab-item i {
                font-size: 20px;
                transition: transform 0.3s ease;
            }

            .mobile-tab-item.active {
                color: #1E3A8A;
                transform: translateY(-2px);
            }

            .mobile-tab-item:active {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 12px;
            }

            .mobile-cart-badge {
                position: absolute;
                top: -6px;
                right: 20%;
                background-color: #E61C38;
                color: white;
                font-size: 9px;
                font-weight: 700;
                padding: 2px 5px;
                border-radius: 10px;
                min-width: 16px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 12px;
                gap: 12px;
            }

            .cart-item {
                padding: 12px;
                gap: 12px;
            }

            .item-image {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .item-title {
                font-size: 14px;
            }

            .item-price {
                font-size: 15px;
            }

            .summary-box {
                padding: 16px;
            }

            .summary-row {
                font-size: 13px;
            }

            .total-row {
                font-size: 16px;
            }

            .checkout-btn {
                padding: 12px;
                font-size: 14px;
            }

            body {
                padding-top: 70px;
            }

            .cart-header > div {
                padding: 0 12px;
            }
        }

        /* Small phones optimization */
        @media (max-width: 380px) {
            .cart-item {
                padding: 10px;
                gap: 10px;
            }

            .item-image {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .summary-box h3 {
                font-size: 16px;
            }

            body {
                padding-top: 65px;
            }
        }

        /* Confirm Modal Styles */
        #confirmModal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 3000; align-items: center; justify-content: center;
        }
        #confirmModal.active { display: flex; }
        .modal-content {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(25px) saturate(210%);
            -webkit-backdrop-filter: blur(25px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 40px 36px;
            border-radius: 20px;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 2px rgba(255, 255, 255, 0.8);
        }
        .modal-content h3 {
            margin: 0 0 12px 0;
            font-size: 22px;
            font-weight: 700;
            color: #1F2229;
        }
        .modal-content p {
            margin: 0 0 24px 0;
            font-size: 14px;
            color: #404553;
            line-height: 1.6;
        }

        /* Swipe-to-delete */
        .cart-item-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .cart-item-wrap .swipe-delete-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 60%, rgba(230, 28, 56, 0.9) 100%);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 24px;
            border-radius: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .cart-item-wrap.swiping .swipe-delete-bg { opacity: 1; }
        .swipe-delete-bg i { color: white; font-size: 22px; }
        .cart-item-wrap .cart-item {
            margin-bottom: 0;
            position: relative;
            transition: transform 0.3s ease;
            will-change: transform;
        }
        .cart-item-wrap .cart-item:hover { transform: translateY(0) scale(1) !important; }
    </style>
</head>
<body>
    <header class="cart-header">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
            <a href="index.html"><img src="logo.png" alt="NetLet home" width="3130" height="1725" decoding="async" style="height: 50px; width: auto;"></a>
            <h2 style="margin: 0; font-size: 18px;">Shopping Cart</h2>
            <a href="index.html" style="color: var(--netlet-blue); font-weight: 700;">Continue Shopping</a>
        </div>
    </header>

    <main class="container" id="cartContainer">
        <div class="cart-items-section" id="cartItems">
            <!-- Items injected by cart.js -->
        </div>

        <div class="order-summary-section">
            <div class="summary-box">
                <h3 style="margin-top: 0;">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal (<span id="itemCount">0</span> items)</span>
                    <span>KWD <span id="subtotal">0.00</span></span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: #28a745;">FREE</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span>KWD <span id="total">0.00</span></span>
                </div>

                <!-- Promo Code Section -->
                <div class="promo-section">
                    <div class="promo-input-group">
                        <input type="text" id="promoCode" placeholder="Enter promo code" maxlength="20">
                        <button class="apply-promo-btn" id="applyPromoBtn">Apply</button>
                    </div>
                    <div id="promoMessage" class="promo-message" style="display: none;"></div>
                </div>

                <!-- Discount Row (hidden by default) -->
                <div class="summary-row discount-row" id="discountRow" style="display: none; position: relative;">
                    <span id="discountLabel">Discount</span>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span>-KWD <span id="discountAmount">0.00</span></span>
                        <button id="removePromoBtn" style="background: none; border: none; color: #7E859B; cursor: pointer; font-size: 12px; font-weight: 600; padding: 2px 6px; transition: all 0.2s; border-radius: 4px;" title="Remove promo code">✕</button>
                    </div>
                </div>

                <button class="checkout-btn">CHECKOUT NOW</button>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom UI for Cart Page -->
    <div class="mobile-bottom-ui">
        <nav class="mobile-tabs">
            <div class="tab-indicator" style="transform: translateX(400%);"></div>
            <a href="index.html" class="mobile-tab-item" aria-label="Home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="index.html#categories" class="mobile-tab-item" aria-label="Categories">
                <i class="fas fa-th-large"></i>
                <span>Categories</span>
            </a>
            <a href="index.html#deals" class="mobile-tab-item" aria-label="Deals">
                <i class="fas fa-tags"></i>
                <span>Deals</span>
            </a>
            <a href="account.html" class="mobile-tab-item" aria-label="Account">
                <i class="fas fa-user"></i>
                <span>Account</span>
            </a>
            <a href="cart.html" class="mobile-tab-item active" aria-label="Cart">
                <i class="fas fa-shopping-cart"></i>
                <span>Cart</span>
                <span class="mobile-cart-badge">0</span>
            </a>
        </nav>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal">
        <div class="modal-content">
            <h3>Remove Item?</h3>
            <p>Are you sure you want to remove this from your cart?</p>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button id="cancelBtn" style="flex:1; padding:12px; border-radius:12px; border:1px solid rgba(255, 255, 255, 0.6); background:rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px) saturate(180%); color:#1E3A8A; font-weight: 600; font-size: 14px; cursor:pointer; transition: all 0.3s ease;">Cancel</button>
                <button id="confirmBtn" style="flex:1; padding:12px; border-radius:12px; background:linear-gradient(135deg, #E61C38 0%, #B81530 100%); color:white; border:none; font-weight: 600; font-size: 14px; cursor:pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(230, 28, 56, 0.2);">Remove</button>
            </div>
        </div>
    </div>

    <script type="module" src="cart.js"></script>
    <script>
        // Debug logging to see cart state
        window.addEventListener('load', () => {
            const cartIds = JSON.parse(localStorage.getItem('netletCart')) || [];
            console.log('Cart page loaded. Cart IDs in storage:', cartIds);
            console.log('Cart length:', cartIds.length);
        });

        window.addEventListener('error', (e) => {
            console.error('JavaScript Error:', e.message, e.filename);
        });

        // Tab Switching Feedback
        const mobileTabs = document.querySelectorAll('.mobile-tab-item');
        const indicator = document.querySelector('.tab-indicator');

        mobileTabs.forEach((tab, index) => {
            tab.addEventListener('click', function() {
                mobileTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                if (indicator) indicator.style.transform = `translateX(${index * 100}%)`;
            });
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
        }
    </script>
</body>
</html>
